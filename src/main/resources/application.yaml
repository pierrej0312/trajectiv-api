spring:
  application:
    name: trajectiv-api

  config:
    import: optional:file:.env[.properties]

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH:false}
          starttls:
            enable: ${MAIL_TLS:false}
            required: ${MAIL_TLS_REQUIRED:false}
            connectiontimeout: 5000
            timeout: 5000
            writetimeout: 5000

  datasource:
    url: ${DATA_URL:jdbc:postgresql://localhost:5434/trajectiv}
    username: ${DATA_USERNAME:postgres}
    password: ${DATA_PASSWORD:Failure70}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/trajectiv}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/trajectiv/protocol/openid-connect/certs}

server:
  port: ${API_PORT:8081}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    oauth2-redirect-url: http://localhost:8081/api/swagger-ui/oauth2-redirect.html
    oauth:
      client-id: trajectiv-web
      use-pkce-with-authorization-code-grant: true

trajectiv:
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - Accept
      - Origin
    exposed-headers:
      - Location

  storage:
    provider: ${STORAGE_PROVIDER:local}
    local-root: ${STORAGE_LOCAL_ROOT:./storage}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:8081/files}
    max-avatar-size-bytes: ${STORAGE_MAX_AVATAR_SIZE_BYTES:2097152}

  mail:
    from-address: ${MAIL_FROM:no-reply@trajectiv.local}
    invitation-base-url: ${INVITATION_BASE_URL:http://localhost:4200/invitations/accept}